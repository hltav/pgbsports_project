name: Deploy Master

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 600s
          script: |
            set -ex
            APP_DIR="/var/www/rtsmanager_backend"
            
            # 1. Configurar SSH com nova chave
            echo "🔑 Configurando SSH..."
            mkdir -p ~/.ssh
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/github_actions
            chmod 600 ~/.ssh/github_actions
            
            # Gerar chave pública correspondente
            ssh-keygen -y -f ~/.ssh/github_actions > ~/.ssh/github_actions.pub
            
            echo -e "Host github.com\n\
              HostName github.com\n\
              User git\n\
              IdentityFile ~/.ssh/github_actions\n\
              IdentitiesOnly yes\n\
              StrictHostKeyChecking no" > ~/.ssh/config
            chmod 600 ~/.ssh/config
            
            # 2. Testar conexão
            echo "🔍 Testando conexão..."
            ssh -T git@github.com || true
            
            # 3. Gerenciar repositório
            echo "🧹 Preparando ambiente..."
            sudo rm -rf $APP_DIR
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            echo "📥 Clonando repositório..."
            GIT_SSH_COMMAND="ssh -v -i ~/.ssh/github_actions" git clone git@github.com:hltav/pgbsports_project.git .
            
            # Resto do script...
            npm ci --production
            npm run build
            pm2 start dist/main.js --name rtsmanager
            pm2 save