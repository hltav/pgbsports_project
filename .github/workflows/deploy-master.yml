name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Configuração do SSH para o GitHub
      - name: Add GitHub SSH Key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.GIT_DEPLOY_KEY }}

      # Checkout do código
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.GIT_DEPLOY_KEY }}

      # Deploy na VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -ex
            
            # Configuração do SSH para o GitHub na VPS
            mkdir -p ~/.ssh
            echo "${{ secrets.GIT_DEPLOY_KEY }}" > ~/.ssh/github_key
            chmod 600 ~/.ssh/github_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            
            # Configuração do Git
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            
            APP_DIR="/var/www/rtsmanager_backend"
            REPO="git@github.com:hltav/pgbsports_project.git"
            ECOSYSTEM="$APP_DIR/ecosystem.config.js"
            
            # Preparar diretório
            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
            cd $APP_DIR
            
            # Clone/Atualização do repositório
            if [ ! -d .git ]; then
              echo "🆕 Clonando repositório..."
              git clone $REPO .
            else
              echo "🔄 Atualizando código..."
              git fetch origin master
              git reset --hard origin/master
              git clean -fd
            fi
            
            # Resto do seu script original...
            npm ci --production
            npm run build
            
            pm2 startOrReload $ECOSYSTEM --env production || pm2 start dist/main.js --name "rtsmanager"
            pm2 save
            echo "🎉 Deploy concluído com sucesso!"