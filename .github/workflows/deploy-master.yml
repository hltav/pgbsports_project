name: Deploy to VPS on master branch update

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Adicione um ambiente para melhor gerenciamento de secrets

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Verify secrets are available
      run: |
        if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
          echo "::error::One or more required secrets are missing"
          exit 1
        fi
        echo "All required secrets are available"

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 300s
        script: |
          set -e
          APP_DIR="/var/www/rtsmanager_backend"
          
          echo "Starting deployment process..."
          
          # Prepare directory
          sudo mkdir -p $APP_DIR
          sudo chown -R $USER:$USER $APP_DIR
          cd $APP_DIR
          
          # Configure Git
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          
          # Clone or update repository
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Cloning repository..."
            git clone git@github.com:hltav/pgbdsports_project.git $APP_DIR
          fi
          
          cd $APP_DIR
          git fetch origin
          git reset --hard origin/master
          git clean -fd
          
          # Install dependencies
          npm install --production
          
          # Build project
          npm run build
          
          # PM2 process management
          if [ -f "ecosystem.config.js" ]; then
            pm2 delete rtsmanager || true
            pm2 startOrReload ecosystem.config.js --env production
          else
            pm2 delete rtsmanager || true
            pm2 start dist/main.js --name rtsmanager
          fi
          
          pm2 save
          echo "Deployment completed successfully!"