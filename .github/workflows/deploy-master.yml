name: Deploy to VPS on master branch update

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 300s
        script: |
          set -ex  # Modo verbose e sai no primeiro erro
          APP_DIR="/var/www/rtsmanager_backend"
          REPO="git@github.com:hltav/pgbsports_project.git"
          
          # 1. Preparar ambiente
          echo "🔧 Configurando ambiente..."
          sudo mkdir -p $APP_DIR
          sudo chown -R $USER:$USER $APP_DIR
          cd $APP_DIR
          
          # 2. Sincronizar código
          echo "🔄 Sincronizando repositório..."
          if [ ! -d "$APP_DIR/.git" ]; then
            git clone $REPO .
          else
            git fetch origin
            git reset --hard origin/master
            git clean -fd
          fi
          
          # 3. Instalar dependências
          echo "📦 Instalando dependências..."
          npm ci --production
          
          # 4. Build do projeto
          echo "🏗️ Executando build..."
          npm run build
          
          # 5. Gerenciar processo
          echo "🚀 Configurando PM2..."
          pm2 delete rtsmanager || true
          [ -f "ecosystem.config.js" ] && \
            pm2 startOrReload ecosystem.config.js --env production || \
            pm2 start dist/main.js --name rtsmanager
          
          pm2 save
          pm2 list
          echo "✅ Deploy concluído com sucesso!"