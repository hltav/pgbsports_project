name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -ex

            APP_DIR="/var/www/rtsmanager_backend"
            REPO="https://github.com/hltav/pgbdsports_project.git"
            ECOSYSTEM="$APP_DIR/ecosystem.config.js"

            echo "📁 Criando diretório do app (se necessário)..."
            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR
            cd $APP_DIR

            echo "🔧 Configurando Git..."
            git config --global url."git@github.com:".insteadOf "https://github.com/"
            
            if [ ! -d .git ]; then
              echo "🆕 Clonando repositório..."
              git init
              git remote add origin $REPO
            fi

            echo "📥 Atualizando código..."
            git fetch origin master
            git reset --hard origin/master
            git clean -fd

            echo "📦 Instalando dependências..."
            npm ci --production

            echo "🔨 Buildando aplicação..."
            npm run build

            echo "🚀 Gerenciando processo com PM2..."
            pm2 delete rtsmanager || true
            if [ -f "$ECOSYSTEM" ]; then
              pm2 startOrReload $ECOSYSTEM --env production
            else
              pm2 start dist/main.js --name rtsmanager
            fi

            pm2 save
            pm2 startup | grep -v PM2_HOME || true

            echo "✅ Deploy finalizado com sucesso!"
            pm2 list
