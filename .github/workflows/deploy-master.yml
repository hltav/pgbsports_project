name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Passo 1: Configurar chave SSH para o GitHub (opcional, mas recomendado)
      - name: Setup SSH for GitHub
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.GIT_DEPLOY_KEY }}

      # Passo 2: Checkout do código
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.GIT_DEPLOY_KEY }}

      # Passo 3: Deploy na VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -ex
            
            # ===== CONFIGURAÇÃO SSH =====
            mkdir -p ~/.ssh
            echo "${{ secrets.GIT_DEPLOY_KEY }}" > ~/.ssh/github_key
            chmod 600 ~/.ssh/github_key
            
            # Configuração explícita do SSH
            cat >> ~/.ssh/config <<EOF
            Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/github_key
              IdentitiesOnly yes
            EOF
            
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts
            
            # ===== VERIFICAÇÃO =====
            echo "🔍 Testando conexão com GitHub..."
            ssh -T git@github.com || true
            
            # ===== CONFIGURAÇÃO DO PROJETO =====
            APP_DIR="/var/www/rtsmanager_backend"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} "$APP_DIR"
            cd "$APP_DIR"
            
            # ===== ATUALIZAÇÃO DO CÓDIGO =====
            if [ ! -d .git ]; then
              echo "🆕 Clonando repositório..."
              git clone git@github.com:hltav/pgbsports_project.git .
            else
              echo "🔄 Atualizando código..."
              git fetch origin master
              git reset --hard origin/master
              git clean -fd
            fi
            
            # ===== BUILD E DEPLOY =====
            echo "📦 Instalando dependências..."
            npm ci --production
            
            echo "🔨 Buildando aplicação..."
            npm run build
            
            echo "🚀 Iniciando aplicação..."
            pm2 startOrReload ecosystem.config.js --env production || \
              pm2 start dist/main.js --name "rtsmanager"
            
            pm2 save
            echo "✅ Deploy concluído com sucesso!"
            pm2 list