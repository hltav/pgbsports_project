name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -ex
            
            # ===== CONFIGURAÇÃO GIT =====
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            
            # ===== CONFIGURAÇÃO SSH =====
            mkdir -p ~/.ssh
            echo "${{ secrets.GIT_DEPLOY_KEY }}" > ~/.ssh/github_key
            chmod 600 ~/.ssh/github_key
            
            cat > ~/.ssh/config <<EOF
            Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/github_key
              IdentitiesOnly yes
            EOF
            
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts
            
            # ===== VERIFICAÇÃO =====
            echo "🔍 Testando conexão..."
            ssh -T git@github.com || true
            
            # ===== DEPLOY =====
            APP_DIR="/var/www/rtsmanager_backend"
            REPO_URL="git@github.com:hltav/pgbsports_project.git"

            sudo mkdir -p "$APP_DIR"
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} "$APP_DIR"
            cd "$APP_DIR"
            
            if [ ! -d .git ]; then
              echo "🆕 Clonando repositório..."
              git clone "$REPO_URL" .
            else
              echo "🔄 Atualizando código..."
              git remote set-url origin "$REPO_URL"
              git fetch origin master
              git reset --hard origin/master
              git clean -fd
            fi
            
            # ===== BUILD =====
            echo "📦 Limpando instalação anterior..."
            rm -rf node_modules package-lock.json

            echo "📦 Instalando dependências..."
            npm install --omit=dev --prefer-offline --no-audit
            
            echo "🔨 Buildando aplicação..."
            npm run build
            
            # ===== PM2 =====
            echo "🚀 Iniciando aplicação..."
            pm2 startOrReload ecosystem.config.js --env production || \
              pm2 start dist/main.js --name "rtsmanager"
            
            pm2 save
            echo "✅ Deploy concluído com sucesso!"
            pm2 list
