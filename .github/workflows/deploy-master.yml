name: Deploy to VPS on master branch update

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Test SSH connection
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: echo "SSH connection to VPS is working!"

    - name: Deploy to Hetzner VPS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          # Caminho onde o app será hospedado
          APP_DIR="/var/www/rtsmanager_backend"

          # Se o diretório não for um repositório Git, clone
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Clonando repositório..."
            git clone https://github.com/hltav/pgbdsports_project.git $APP_DIR
          fi

          cd $APP_DIR

          echo "Atualizando código..."
          git pull origin master

          echo "Instalando dependências..."
          npm install

          echo "Building project..."
          npm run build

          echo "Iniciando com PM2..."
          pm2 startOrReload ecosystem.config.js || pm2 start dist/main.js --name rtsmanager
