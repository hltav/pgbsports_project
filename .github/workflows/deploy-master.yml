name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 600s
        script: |
          set -ex
          APP_DIR="/var/www/rtsmanager_backend"
          
          # 1. Garantir permissões (como você já executou manualmente)
          echo "🔒 Verificando permissões..."
          sudo chown -R $USER:$USER /var/www
          sudo chmod -R 755 /var/www
          
          # 2. Configurar ambiente
          echo "📂 Preparando diretório da aplicação..."
          mkdir -p $APP_DIR
          cd $APP_DIR
          
          # 3. Configurar Git SSH
          echo "🔑 Configurando acesso Git..."
          mkdir -p ~/.ssh
          echo -e "Host github.com\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          
          # 4. Gerenciar repositório
          echo "🔄 Sincronizando código..."
          if [ ! -d ".git" ]; then
            git clone git@github.com:hltav/pgbsports_project.git .
          else
            git fetch origin
            git reset --hard origin/master
            git clean -fd
          fi
          
          # 5. Instalar e buildar
          echo "📦 Instalando dependências..."
          npm ci --production
          
          echo "🏗️ Buildando aplicação..."
          npm run build
          
          # 6. Gerenciar processo
          echo "🚀 Iniciando PM2..."
          pm2 delete rtsmanager || true
          pm2 start dist/main.js --name rtsmanager
          pm2 save
          
          echo "✅ Deploy concluído com sucesso!"
          echo "🔄 Status da aplicação:"
          pm2 list