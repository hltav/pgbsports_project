name: Deploy to VPS on master branch update

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          # Configurações iniciais
          APP_DIR="/var/www/rtsmanager_backend"
          LOG_FILE="/tmp/deploy_$(date +'%Y%m%d_%H%M%S').log"
          
          # Criar diretório se não existir
          sudo mkdir -p $APP_DIR
          sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} $APP_DIR
          
          # Configurar Git para usar SSH
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          
          # Clonar ou atualizar repositório
          cd $APP_DIR
          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Clonando repositório..."
            git clone git@github.com:hltav/pgbdsports_project.git $APP_DIR || exit 1
          fi
          
          # Atualizar código
          echo "Atualizando código..."
          git fetch origin master
          git reset --hard origin/master
          
          # Instalar dependências
          echo "Instalando dependências..."
          npm install --production
          
          # Build do projeto
          echo "Buildando projeto..."
          npm run build
          
          # Reiniciar aplicação
          echo "Reiniciando aplicação..."
          if [ -f "$APP_DIR/ecosystem.config.js" ]; then
            pm2 delete rtsmanager || true
            pm2 startOrReload ecosystem.config.js --env production
          else
            pm2 delete rtsmanager || true
            pm2 start dist/main.js --name rtsmanager
          fi
          
          # Limpeza
          pm2 save
          pm2 startup | grep -v PM2_HOME