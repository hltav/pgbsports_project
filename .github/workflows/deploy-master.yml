name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -ex
            
            # 1. Verificar e corrigir configuração SSH
            sudo sed -i '/permit\*\*\*login/d' /etc/ssh/ssh_config
            sudo systemctl restart ssh

            # 2. Variáveis do projeto
            APP_DIR="/var/www/rtsmanager_backend"
            REPO="git@github.com:hltav/pgbdsports_project.git"
            
            # 3. Configuração do ambiente
            sudo mkdir -p $APP_DIR
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} $APP_DIR
            cd $APP_DIR
            
            # 4. Configuração do Git
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            
            # 5. Clone/Atualização com tratamento de erro
            if [ ! -d .git ]; then
              git clone $REPO . || { echo "❌ Falha no clone"; exit 1; }
            else
              git fetch origin master || { echo "❌ Falha no fetch"; exit 1; }
              git reset --hard origin/master
              git clean -fd
            fi

            # 6. Instalação e build
            npm ci --production
            npm run build

            # 7. PM2 com fallback
            if [ -f "ecosystem.config.js" ]; then
              pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            else
              pm2 start dist/main.js --name "rtsmanager"
            fi
            pm2 save